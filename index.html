<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cetak Buku Nilai - V7 Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-app: #e5e7eb;
            --bg-panel: #ffffff;
            --border: #d1d5db;
            --text: #1f2937;
            --a4-width: 210mm;
            --a4-height: 297mm;
            --max-rows-per-page: 30; /* Batas baris siswa per halaman A4 */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-app); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        aside { 
            width: 340px; 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            z-index: 10; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.05); 
        }

        .sidebar-header { 
            padding: 20px; 
            background: var(--primary); 
            color: white; 
            text-align: center;
        }

        .sidebar-header h2 { 
            font-size: 1.2rem; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sidebar-content { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #4b5563; 
        }

        .form-control { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 0.85rem; 
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.form-control { 
            resize: vertical; 
            min-height: 80px; 
            font-family: monospace; 
            line-height: 1.4;
        }

        .help-text { font-size: 0.75rem; color: #6b7280; margin-top: 4px; }

        .sidebar-footer { 
            padding: 20px; 
            border-top: 1px solid var(--border); 
            background: var(--bg-panel); 
            display: flex;
            gap: 10px;
        }

        .btn { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: white; border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { background: #f9fafb; }

        main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 30px; 
            background: #525659; /* Warna gelap khas PDF viewer */
        }

        .page { 
            width: var(--a4-width); 
            height: var(--a4-height); 
            background: white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            padding: 12mm 15mm; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
        }

        /* Typography & Header Print */
        .paper-header { 
            text-align: center; 
            margin-bottom: 12px; 
            border-bottom: 3px double #000; 
            padding-bottom: 8px; 
            flex-shrink: 0; 
        }
        .school-name { font-size: 14pt; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        .school-address { font-size: 9pt; font-style: italic; }

        /* Cover Specific */
        .cover-info { 
            margin: auto 0; /* Vertically center */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            line-height: 1.8; 
        }
        .cover-logo { max-width: 130px; height: auto; margin-bottom: 20px; display: block; }
        .cover-info div { font-size: 12pt; }
        .cover-title { font-size: 16pt; font-weight: bold; margin: 20px 0; text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 9.5pt; }
        th, td { border: 1px solid #000; padding: 4px 6px; vertical-align: middle; line-height: 1.2; }
        th { background-color: #f3f4f6; text-align: center; font-weight: bold; font-size: 9pt; }
        .col-narrow { width: 35px; text-align: center; }
        .col-score { width: 45px; text-align: center; } 
        
        .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; margin-bottom: 10px; font-size: 10pt; }
        .info-label { font-weight: bold; }

        .signature-section { margin-top: auto; display: flex; justify-content: space-between; padding-top: 15px; }
        .sig-block { text-align: center; width: 180px; font-size: 10pt; }
        .sig-space { height: 60px; }

        /* Anecdotal Styling */
        .anec-header-grid { display: grid; grid-template-columns: auto 1fr auto 1fr; gap: 5px 15px; margin-bottom: 10px; font-size: 10pt; }
        .anec-container { display: flex; flex-direction: column; gap: 15px; flex: 1; } 
        .anec-box { border: 1px solid #000; flex: 1; display: flex; flex-direction: column; padding: 5px; }
        .anec-box-title { font-size: 10pt; font-weight: bold; margin-bottom: 5px; text-align: center; background: #f3f4f6; padding: 4px;}
        .table-anec { flex: 1; width: 100%; border: 1px solid #000; }
        .table-anec th, .table-anec td { padding: 6px; text-align: left; }
        .anec-cell-large { height: 100%; vertical-align: top; font-size: 10pt; }

        /* --- AI PANEL STYLING --- */
        .ai-panel { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-top: 15px; margin-bottom: 15px; }
        .ai-panel h3 { font-size: 0.95rem; color: #166534; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; font-weight: 700; }
        .btn-ai { background: #22c55e; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; margin-top: 5px; margin-bottom: 10px; font-size: 0.85rem;}
        .btn-ai:hover { background: #16a34a; }
        .btn-ai:disabled { background: #86efac; cursor: not-allowed; }
        .loader { display: none; width: 14px; height: 14px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; animation: rotation 1s linear infinite; vertical-align: middle; margin-left: 8px;}
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .anec-list-item { background: white; border: 1px solid #d1d5db; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.8rem; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .anec-list-item .remove-btn { position: absolute; top: 5px; right: 5px; color: #ef4444; cursor: pointer; font-weight: bold; border: none; background: transparent; font-size: 1.1rem;}

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; display: block; height: auto; overflow: visible; }
            aside { display: none !important; }
            main { padding: 0; background: white; display: block; overflow: visible; gap: 0; }
            .page { 
                box-shadow: none; 
                margin: 0; 
                width: 100%; 
                height: 297mm; 
                page-break-after: always; 
                border: none; 
                padding: 12mm 15mm !important; 
            }
            .page:last-child { page-break-after: auto; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">
            <h2>Buku Nilai & Anecdotal</h2>
        </div>

        <div class="sidebar-content">
            <div class="form-group">
                <label>Logo Sekolah</label>
                <input type="file" id="logoInput" accept="image/*" class="form-control">
                <p class="help-text">Upload logo (PNG/JPG). Opsional.</p>
            </div>
            
            <div class="form-group">
                <label>Identitas Sekolah</label>
                <input type="text" id="schoolName" class="form-control" value="SMA NEGERI 1 CONTOH">
                <input type="text" id="schoolAddr" class="form-control" style="margin-top:8px;" value="Jl. Pendidikan No. 1, Kota">
            </div>

            <div class="form-group">
                <label>Info Kelas & Guru</label>
                <select id="semester" class="form-control" style="margin-bottom: 8px;">
                    <option value="Ganjil">Semester Ganjil</option>
                    <option value="Genap">Semester Genap</option>
                </select>
                <input type="text" id="academicYear" class="form-control" placeholder="Tahun Pelajaran" value="2023/2024">
                <input type="text" id="className" class="form-control" placeholder="Kelas" value="X IPA 1" style="margin-top:8px;">
                <input type="text" id="teacherName" class="form-control" placeholder="Nama Guru" value="Nama Guru, S.Pd." style="margin-top:8px;">
            </div>

            <div class="form-group">
                <label>Daftar Nama Siswa</label>
                <textarea id="studentList" class="form-control" placeholder="Satu nama per baris.">Ahmad Santoso
Budi Pratama
Citra Dewi
Dian Permata

Fani Rahmawati

Vera Susanti
Wahyu Hidayat
Xena Putri

Andi Saputra
Bunga Citra
Cakra Khan
Dedi Corbuh</textarea>
                <p class="help-text">Otomatis tambah halaman jika lebih dari 30 siswa.</p>
            </div>

            <div class="form-group">
                <label>Daftar Mata Pelajaran</label>
                <textarea id="subjectList" class="form-control" placeholder="Nama Mapel per baris...">Matematika Wajib
Bahasa Indonesia
Fisika</textarea>
            </div>

            <div class="form-group">
                <label>Jml. Format TP per Mapel</label>
                <input type="number" id="tpCount" class="form-control" value="1" min="1" max="5">
            </div>

            <div class="form-group">
                <label>Jml. Halaman Anecdotal</label>
                <input type="number" id="anecCount" class="form-control" value="1" min="1" max="10">
            </div>

            <div class="ai-panel">
                <h3>✨ Asisten Anekdotal AI</h3>
                <p class="help-text" style="margin-bottom: 10px; color: #15803d;">Ubah catatan singkat menjadi laporan pedagogis profesional (Otomatis masuk ke lembar cetak).</p>
                
                <div class="form-group">
                    <label>Pilih Siswa</label>
                    <select id="aiStudentSelect" class="form-control"></select>
                </div>
                
                <div class="form-group">
                    <label>Kejadian Singkat (Draft)</label>
                    <textarea id="aiRawEvent" class="form-control" style="min-height: 50px;" placeholder="Cth: Budi sering main game di kelas saat jam pelajaran."></textarea>
                </div>

                <span id="aiError" style="color:#ef4444; font-size:0.75rem; display:none; margin-bottom: 5px;"></span>

                <button id="btnGenerateAI" class="btn-ai" onclick="generatePedagogicalRecord()">
                    Ubah dgn AI <span class="loader" id="aiLoader"></span>
                </button>

                <div id="aiResultArea" style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #bbf7d0;">
                    <div class="form-group">
                        <label>Kejadian (Baku)</label>
                        <textarea id="resEvent" class="form-control" style="min-height: 50px; font-size: 0.75rem; line-height: 1.3;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Penanganan</label>
                        <textarea id="resAction" class="form-control" style="min-height: 50px; font-size: 0.75rem; line-height: 1.3;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Hasil</label>
                        <textarea id="resOutcome" class="form-control" style="min-height: 50px; font-size: 0.75rem; line-height: 1.3;"></textarea>
                    </div>
                    <button class="btn btn-secondary" style="font-size: 0.8rem; padding: 10px; border-color: #22c55e; color: #166534;" onclick="addAnecdotalRecord()">➕ Masukkan ke Dokumen</button>
                </div>
                
                <div style="margin-top: 15px;">
                    <label style="font-size: 0.85rem; font-weight: 600; color: #166534;">Data Tersimpan:</label>
                    <div id="recordedAnecList" style="margin-top: 8px;">
                        <div style="font-size:0.75rem; color:#6b7280; font-style:italic;">Belum ada data.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="btn btn-primary" onclick="updatePreview()">Update Preview</button>
            <button class="btn btn-secondary" onclick="window.print()">Cetak PDF</button>
        </div>
    </aside>

    <main id="previewContainer">
        <!-- Halaman akan di-generate oleh JavaScript di sini -->
    </main>

    <script>
        let logoDataUrl = "https://picsum.photos/seed/schoollogo/120/120"; 
        const ROWS_PER_PAGE = 30; // Konstanta batas baris per halaman

        let anecdotalData = []; // Menyimpan data catatan anekdotal dari AI

        // Handle File Upload Logo
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    logoDataUrl = event.target.result;
                    updatePreview();
                }
                reader.readAsDataURL(file);
            }
        });

        // Helper: Mengambil array dari textarea
        function getTextareaList(id) {
            const raw = document.getElementById(id).value;
            return raw.split('\n').map(s => s.trim()).filter(s => s !== "");
        }

        // Helper: Memecah array siswa menjadi beberapa halaman (Pagination)
        function chunkArray(array, size) {
            const result = [];
            for (let i = 0; i < array.length; i += size) {
                result.push(array.slice(i, i + size));
            }
            return result;
        }

        // --- AI GEMINI INTEGRATION ---
        
        function updateStudentDropdown() {
            const students = getTextareaList('studentList');
            const select = document.getElementById('aiStudentSelect');
            if (select) {
                select.innerHTML = students.map(s => `<option value="${s}">${s}</option>`).join('');
            }
        }
        
        // Listener to dynamically update dropdown when student list text area changes
        document.getElementById('studentList').addEventListener('input', updateStudentDropdown);

        async function generatePedagogicalRecord() {
            const studentName = document.getElementById('aiStudentSelect').value;
            const rawEvent = document.getElementById('aiRawEvent').value;
            const errorSpan = document.getElementById('aiError');
            
            if(!rawEvent.trim()) {
                errorSpan.textContent = "Silakan tulis kejadian singkat terlebih dahulu.";
                errorSpan.style.display = 'block';
                return;
            }
            errorSpan.style.display = 'none';

            const btn = document.getElementById('btnGenerateAI');
            const loader = document.getElementById('aiLoader');
            const resultArea = document.getElementById('aiResultArea');
            
            btn.disabled = true;
            loader.style.display = 'inline-block';

            // Membangun prompt untuk mengubah data mentah menjadi formal
            const prompt = `Anda adalah seorang ahli pedagogi dan pendidik profesional. Tugas Anda adalah mengubah catatan kasar/informal dari kejadian siswa di sekolah menjadi laporan anekdotal yang sangat profesional, objektif, berorientasi solusi, dan menggunakan bahasa Indonesia yang baku.
            
Nama Siswa: ${studentName}
Catatan Kasar Guru: ${rawEvent}

Mohon formulasikan ulang menjadi 3 poin berikut:
1. "kejadian": Deskripsi objektif mengenai apa yang diamati/terjadi di lingkungan sekolah.
2. "penanganan": Tindakan pedagogis profesional, pembinaan, atau langkah preventif yang sebaiknya dilakukan/telah dilakukan oleh guru/sekolah.
3. "hasil": Harapan perkembangan atau hasil dari penanganan tersebut terhadap karakter/akademis siswa.`;

            // Konfigurasi schema JSON untuk mempermudah pemetaan ke input UI
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            kejadian: { type: "STRING" },
                            penanganan: { type: "STRING" },
                            hasil: { type: "STRING" }
                        }
                    }
                }
            };

            const apiKey = ""; // API Key otomatis ditangani oleh Canvas
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (result.candidates && result.candidates.length > 0) {
                    const jsonStr = result.candidates[0].content.parts[0].text;
                    const data = JSON.parse(jsonStr);
                    
                    document.getElementById('resEvent').value = data.kejadian;
                    document.getElementById('resAction').value = data.penanganan;
                    document.getElementById('resOutcome').value = data.hasil;
                    
                    resultArea.style.display = 'block';
                }
            } catch (error) {
                console.error("Gemini API Error:", error);
                errorSpan.textContent = "Gagal menghubungi AI. Terjadi kesalahan jaringan atau API.";
                errorSpan.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function addAnecdotalRecord() {
            const student = document.getElementById('aiStudentSelect').value;
            const event = document.getElementById('resEvent').value;
            const action = document.getElementById('resAction').value;
            const outcome = document.getElementById('resOutcome').value;
            
            if(!event) return;

            anecdotalData.push({ student, event, action, outcome });
            
            // Reset AI form
            document.getElementById('aiRawEvent').value = '';
            document.getElementById('aiResultArea').style.display = 'none';
            
            renderAnecdotalList();
            updatePreview();
        }

        function removeAnecdotalRecord(index) {
            anecdotalData.splice(index, 1);
            renderAnecdotalList();
            updatePreview();
        }

        function renderAnecdotalList() {
            const container = document.getElementById('recordedAnecList');
            if (anecdotalData.length === 0) {
                container.innerHTML = '<div style="font-size:0.75rem; color:#6b7280; font-style:italic;">Belum ada data.</div>';
                return;
            }
            container.innerHTML = anecdotalData.map((data, idx) => `
                <div class="anec-list-item">
                    <strong>${data.student}</strong><br>
                    <span style="color:#6b7280; font-size:0.75rem">${data.event.substring(0, 45)}...</span>
                    <button class="remove-btn" onclick="removeAnecdotalRecord(${idx})" title="Hapus">×</button>
                </div>
            `).join('');
        }

        // 1. Generate Cover
        function generateCover() {
            const school = document.getElementById('schoolName').value || '-';
            const addr = document.getElementById('schoolAddr').value || '-';
            const year = document.getElementById('academicYear').value || '-';
            const sem = document.getElementById('semester').value || '-';
            const cls = document.getElementById('className').value || '-';
            const teacher = document.getElementById('teacherName').value || '-';

            return `
            <div class="page">
                <div class="paper-header" style="border-bottom: 3px double #000;">
                    <div class="school-name">${school}</div>
                    <div class="school-address">${addr}</div>
                </div>
                
                <div class="cover-info">
                    <img src="${logoDataUrl}" alt="Logo" class="cover-logo">
                    <div class="cover-title">BUKU NILAI & ANECDOTAL RECORD</div>
                    <br>
                    <div>Tahun Pelajaran : ${year}</div>
                    <div>Semester       : ${sem}</div>
                    <div>Kelas          : ${cls}</div>
                    <div>Nama Guru      : ${teacher}</div>
                </div>
            </div>
            `;
        }

        // 2. Generate Halaman Format A (TP)
        function generatePageFormatA(subjectName, studentChunk, startIndex, tpIndex, totalPages, currentPage) {
            let tableRows = studentChunk.map((name, i) => `
                <tr>
                    <td class="col-narrow">${startIndex + i + 1}</td>
                    <td>${name}</td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                </tr>
            `).join('');
            
            // Tambahkan baris kosong jika chunk kurang dari ROWS_PER_PAGE agar tabel tetap rapi di halaman terakhir
            const emptyRowsCount = ROWS_PER_PAGE - studentChunk.length;
            for(let i=0; i < emptyRowsCount; i++) {
                tableRows += `
                <tr>
                    <td class="col-narrow">&nbsp;</td>
                    <td>&nbsp;</td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                </tr>`;
            }

            const pageIndicator = totalPages > 1 ? ` (Hal ${currentPage}/${totalPages})` : '';

            return `
            <div class="page">
                <div class="paper-header">
                    <div class="school-name" style="font-size: 12pt;">LEMBAR KERJA SISWA${pageIndicator}</div>
                </div>

                <div class="info-grid">
                    <div class="info-label">Mata Pelajaran</div>
                    <div>: ${subjectName}</div>
                    <div class="info-label">Kelas</div>
                    <div>: ${document.getElementById('className').value}</div>
                    <div class="info-label">LM / Bab</div>
                    <div>: .....................................................................</div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th class="col-narrow">No</th>
                            <th>Nama Siswa</th>
                            <th class="col-score">TP 1</th>
                            <th class="col-score">TP 2</th>
                            <th class="col-score">TP 3</th>
                            <th class="col-score">TP 4</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            </div>
            `;
        }

        // 3. Halaman Format B (Sumatif)
        function generatePageFormatB(subjectName, studentChunk, startIndex, totalPages, currentPage) {
            let tableRows = studentChunk.map((name, i) => `
                <tr>
                    <td class="col-narrow">${startIndex + i + 1}</td>
                    <td>${name}</td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score"></td>
                    <td class="col-score" style="background-color: #f9fafb;">&nbsp;</td>
                </tr>
            `).join('');

            const emptyRowsCount = ROWS_PER_PAGE - studentChunk.length;
            for(let i=0; i < emptyRowsCount; i++) {
                tableRows += `
                <tr>
                    <td class="col-narrow">&nbsp;</td>
                    <td>&nbsp;</td>
                    <td class="col-score"></td><td class="col-score"></td><td class="col-score"></td>
                    <td class="col-score"></td><td class="col-score"></td><td class="col-score" style="background-color: #f9fafb;"></td>
                </tr>`;
            }

            const pageIndicator = totalPages > 1 ? ` (Hal ${currentPage}/${totalPages})` : '';

            // Ambil nama guru dari input, gunakan titik-titik default jika kosong
            const inputTeacherName = document.getElementById('teacherName').value.trim() || '...............................';

            // Tanda tangan hanya tampil di halaman terakhir dari sebuah mapel
            const signatureHTML = (currentPage === totalPages) ? `
                <div class="signature-section">
                    <div class="sig-block">
                        Mengetahui,<br>Kepala Sekolah
                        <div class="sig-space"></div>
                        <div>( ............................... )</div>
                    </div>
                    <div class="sig-block">
                        Guru Mapel,
                        <div class="sig-space"></div>
                        <div>( ${inputTeacherName} )</div>
                    </div>
                </div>
            ` : '<div style="margin-top:auto;"></div>'; // Spacer

            return `
            <div class="page">
                <div class="paper-header">
                    <div class="school-name" style="font-size: 12pt;">REKAP SUMATIF${pageIndicator}</div>
                </div>

                <div class="info-grid">
                    <div class="info-label">Nama Mapel</div>
                    <div>: ${subjectName}</div>
                    <div class="info-label">Semester</div>
                    <div>: ${document.getElementById('semester').value}</div>
                    <div class="info-label">Kelas</div>
                    <div>: ${document.getElementById('className').value}</div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th class="col-narrow">No</th>
                            <th>Nama Siswa</th>
                            <th class="col-score">LM 1</th>
                            <th class="col-score">LM 2</th>
                            <th class="col-score">LM 3</th>
                            <th class="col-score">LM 4</th>
                            <th class="col-score">LM 5</th>
                            <th class="col-score">Sumatif</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                ${signatureHTML}
            </div>
            `;
        }

        // 4. Generate Halaman Anecdotal
        function generateAnecdotalPage(dataChunk = null) {
            const cls = document.getElementById('className').value;
            const teacher = document.getElementById('teacherName').value;

            let entriesHTML = '';
            
            if (dataChunk && dataChunk.length > 0) {
                // Render data dari AI yang dimasukkan
                dataChunk.forEach((data, index) => {
                    entriesHTML += `
                    <div class="anec-box">
                        <div class="anec-box-title">Data Observasi Siswa: ${data.student}</div>
                        <table class="table-anec">
                            <thead>
                                <tr>
                                    <th style="width: 5%">No</th>
                                    <th style="width: 20%">Nama Siswa</th>
                                    <th style="width: 30%">Kejadian</th>
                                    <th style="width: 25%">Penanganan</th>
                                    <th style="width: 20%">Hasil</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="vertical-align:top; text-align:center;">${index + 1}.</td>
                                    <td class="anec-cell-large"><strong>${data.student}</strong></td>
                                    <td class="anec-cell-large">${data.event}</td>
                                    <td class="anec-cell-large">${data.action}</td>
                                    <td class="anec-cell-large">${data.outcome}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    `;
                });
                
                // Tambahkan elemen kosong tak kasat mata jika hanya 1 baris supaya format grid A4 tetap rapi
                if (dataChunk.length === 1) {
                    entriesHTML += `<div class="anec-box" style="visibility: hidden;"></div>`;
                }
                
            } else {
                // Render Format Kosong Tradisional (Untuk ditulis tangan)
                const createStudentEntry = (label) => `
                    <div class="anec-box">
                        <div class="anec-box-title">${label}</div>
                        <table class="table-anec">
                            <thead>
                                <tr>
                                    <th style="width: 5%">No</th>
                                    <th style="width: 25%">Nama Siswa</th>
                                    <th style="width: 30%">Kejadian</th>
                                    <th style="width: 20%">Penanganan</th>
                                    <th style="width: 20%">Hasil</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="vertical-align:top; text-align:center;">1.</td>
                                    <td class="anec-cell-large"></td>
                                    <td class="anec-cell-large"></td>
                                    <td class="anec-cell-large"></td>
                                    <td class="anec-cell-large"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
                entriesHTML = createStudentEntry("Catatan Kejadian 1") + createStudentEntry("Catatan Kejadian 2");
            }

            // Ambil nama guru, gunakan titik-titik default jika kosong
            const finalTeacherName = (teacher && teacher.trim()) ? teacher.trim() : '...............................';

            return `
            <div class="page">
                <div class="paper-header">
                    <div class="school-name" style="font-size: 12pt;">ANECDOTAL RECORD</div>
                </div>

                <div class="anec-header-grid">
                    <div class="info-label">Hari/Tanggal</div>
                    <div>: ..................................................</div>
                    <div class="info-label">Tempat</div>
                    <div>: ..................................................</div>
                    <div class="info-label">Kelas</div>
                    <div>: ${cls}</div>
                    <div class="info-label">Semester</div>
                    <div>: ${document.getElementById('semester').value}</div>
                </div>

                <div class="anec-container">
                    ${entriesHTML}
                </div>

                <div class="signature-section" style="justify-content: flex-end; margin-top: 10px;">
                    <div class="sig-block">
                        Guru Kelas,
                        <div class="sig-space"></div>
                        <div>( ${finalTeacherName} )</div>
                    </div>
                </div>
            </div>
            `;
        }

        function updatePreview() {
            const container = document.getElementById('previewContainer');
            const allStudents = getTextareaList('studentList');
            const subjects = getTextareaList('subjectList');
            const tpCount = parseInt(document.getElementById('tpCount').value) || 1;
            const anecCount = parseInt(document.getElementById('anecCount').value) || 1;
            
            if (allStudents.length === 0) {
                container.innerHTML = `<div style="color:white; margin-top: 50px;">Silakan isi daftar nama siswa terlebih dahulu.</div>`;
                return;
            }

            // Memecah siswa menjadi beberapa halaman jika lebih dari batas (Pagination)
            const studentChunks = chunkArray(allStudents, ROWS_PER_PAGE);
            const totalPagesPerFormat = studentChunks.length;

            let htmlContent = "";

            // 1. Tambahkan Cover
            htmlContent += generateCover();

            // 2. Loop per Mapel
            subjects.forEach(subj => {
                
                // Loop untuk setiap Format TP (TP 1, TP 2, dst)
                for(let tpIndex = 1; tpIndex <= tpCount; tpIndex++) {
                    // Loop halamannya jika siswa banyak
                    studentChunks.forEach((chunk, pageIndex) => {
                        const startIndex = pageIndex * ROWS_PER_PAGE;
                        htmlContent += generatePageFormatA(subj, chunk, startIndex, tpIndex, totalPagesPerFormat, pageIndex + 1);
                    });
                }
                
                // Loop halaman untuk Format Sumatif
                studentChunks.forEach((chunk, pageIndex) => {
                    const startIndex = pageIndex * ROWS_PER_PAGE;
                    htmlContent += generatePageFormatB(subj, chunk, startIndex, totalPagesPerFormat, pageIndex + 1);
                });
            });

            // 3. Tambahkan Halaman Anecdotal
            if (anecdotalData.length > 0) {
                // Mode Cerdas: Mencetak data yang telah dihasilkan AI, dipisah 2 catatan per halaman
                const anecChunks = chunkArray(anecdotalData, 2);
                anecChunks.forEach(chunk => {
                    htmlContent += generateAnecdotalPage(chunk);
                });
            } else {
                // Mode Standar: Mencetak lembaran format kosong untuk ditulisi manual
                for(let k = 1; k <= anecCount; k++) {
                    htmlContent += generateAnecdotalPage();
                }
            }

            container.innerHTML = htmlContent;
        }

        // Inisialisasi tampilan pertama saat web dimuat
        window.addEventListener('DOMContentLoaded', () => {
            updateStudentDropdown();
            renderAnecdotalList();
            updatePreview();
        });
    </script>
</body>
</html>
